        status: 200
        content: '{"success":true,"message":"Products list.","data":{"current_page":1,"data":[{"id":"afef86c7-59ec-441c-802c-c2eeb1b33198","name":"Antarestar Official \u2013 Jaket Gunung Gorpcore Bromo Windproof Waterproof Jacket Musim Dingin Casual Outdoor","slug":"antarestar-official-jaket-gunung-gorpcore-bromo-windproof-waterproof-jacket-musim-dingin-casual-outdoor","description":"Jaket Bromo dirancang untuk menghadapi cuaca ekstrem dan memberikan kenyamanan maksimal dalam segala kondisi. Menggunakan material 3 layer waterproof yang tahan air dan angin, jaket ini cocok untuk berbagai aktivitas outdoor, dari hiking hingga perjalanan di alam terbuka. Dengan desain yang mengutamakan fleksibilitas dan perlindungan, jaket ini dilengkapi dengan berbagai fitur praktis, seperti resleting waterproof, tali serut elastis di pinggang dan hoodie, serta lengan adjustable dengan velcro dan karet. Saku utama dan tambahan di lengan kiri memastikan barang Anda tetap aman dan kering selama petualangan. Jaket Bromo juga dilengkapi dengan jahitan bartack di ujung resleting untuk meningkatkan daya tahan, menjadikannya pilihan tepat untuk menemani petualangan Anda di alam bebas.\n\nFeatures :\n\nMaterial 3 layer waterproof\n\nTahan air dan angin, tetap breathable untuk kenyamanan maksimal.\n\nLengan Adjustable dengan Velcro & Karet \u2013 Dapat disesuaikan untuk kenyamanan optimal di segala kondisi.\n\nTali Serut Elastis di Pinggang & Hoodie\n\nDapat disesuaikan agar lebih pas dengan tubuh Anda.\n\nSaku Utama dan Saku Tambahan di Lengan Kiri dengan Resleting Waterproof\n\nMenjaga barang tetap aman dan kering.\n\nResleting Waterproof YKK No. 5 & No. 3\n\nMenjaga keamanan barang dari cipratan air.\n\nLogo dan Nama Series Bordir\n\nMemberikan sentuhan premium pada jaket.\n\nJahitan Bartack di Ujung Resleting\n\nMemperkuat ketahanan jahitan jaket di area yang sering digunakan.\n\nBENEFITS:\n\nMemberikan perlindungan maksimal terhadap cuaca ekstrem dengan material 3 layer waterproof yang tahan air dan angin.\n\nMeningkatkan kenyamanan saat bergerak dengan desain yang adjustable dan fitur-fitur fungsional.\n\nSaku waterproof menjaga barang tetap aman dan kering bahkan dalam kondisi hujan.\n\nDesain tahan lama dengan jahitan bartack yang meningkatkan daya tahan jaket di area yang rawan aus.\n\nMaterial:\n\nMaterial 3 layer waterproof \u2013 Tahan air, ringan, dan tetap breathable.\n\nSize Chart\n\nM:\n\nLebar dada: 56\n\nPanjang badan: 68\n\nLebar bahu: 46\n\nPanjang tangan: 63\n\nL:\n\nLebar dada: 58\n\nPanjang badan: 70\n\nLebar bahu: 48\n\nPanjang tangan: 64\n\nXL:\n\nLebar dada: 58\n\nPanjang badan: 68\n\nLebar bahu: 50\n\nPanjang tangan: 64\n\nXXL:\n\nLebar dada: 60\n\nPanjang badan: 74\n\nLebar bahu: 52\n\nPanjang tangan: 66","category_id":"2b344173-4fcb-4f62-9ffb-d1243065a4ff","created_at":"2026-04-04T11:26:01.000000Z","updated_at":"2026-04-04T11:26:01.000000Z","sold_count":null,"category":{"id":"2b344173-4fcb-4f62-9ffb-d1243065a4ff","name":"Jackets","slug":"jackets","image_url":null,"created_at":"2026-04-03T10:36:57.000000Z","updated_at":"2026-04-03T10:36:57.000000Z"},"flash_sale_products":[],"variants":[{"id":"13c49429-5aff-4665-81c1-74e4494ccb6e","product_id":"afef86c7-59ec-441c-802c-c2eeb1b33198","name":"XL Hitam","color_name":"Hitam","color_code":"#000","size":"XL","price":"690000.00","stock":0,"created_at":"2026-04-04T11:26:01.000000Z","updated_at":"2026-04-04T11:26:01.000000Z","is_on_flash_sale":false,"flash_sale_price":null},{"id":"481a8196-cc31-4aee-8315-4a8647c46a7e","product_id":"afef86c7-59ec-441c-802c-c2eeb1b33198","name":"XXL Hitam","color_name":"Hitam","color_code":"#000","size":"XXL","price":"690000.00","stock":100,"created_at":"2026-04-04T11:26:01.000000Z","updated_at":"2026-04-04T11:26:01.000000Z","is_on_flash_sale":false,"flash_sale_price":null},{"id":"7a48549a-a3b6-4ddb-a89c-15589a85779d","product_id":"afef86c7-59ec-441c-802c-c2eeb1b33198","name":"L Hitam","color_name":"Hitam","color_code":"#000","size":"L","price":"690000.00"